services:
  db:
    image: postgres:16-alpine
    container_name: techno-store-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: techno
      # Auto-generated by start.sh into .env; "techno" is only the fallback
      # for bare `docker compose up` without the installer.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-techno}
      POSTGRES_DB: techno_store
    ports:
      # Host 5433 -> container 5432 (5433 to avoid clashing with a local Postgres).
      - "5433:5432"
    volumes:
      - techno_store_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techno -d techno_store"]
      interval: 3s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/vasdko4/universal-crm-ua:latest
    container_name: techno-store-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      # Persist admin-uploaded product photos across restarts/rebuilds.
      # Only used when BLOB_READ_WRITE_TOKEN is unset (the default for
      # self-hosted Docker installs); on Vercel this path is simply unused.
      - techno_store_uploads:/app/public/uploads
    environment:
      DATABASE_URL: postgres://techno:${POSTGRES_PASSWORD:-techno}@db:5432/techno_store
      # Generate your own: `openssl rand -base64 32`. Required, no default.
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in .env}
      # Public URL the app is served from (used by Better Auth callbacks).
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      # Protects /api/cron/delivery-sync from anonymous access.
      CRON_SECRET: ${CRON_SECRET:-}
      # Optional: public URL for SEO (sitemap, canonical links, OG tags).
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
      # Lets the admin panel's "Updates" page (/admin/updates) trigger a
      # self-update through the `updater` sidecar below. Both are empty by
      # default, which the admin panel treats as "auto-update not available
      # here" (still shows the current/latest version, just hides the button).
      UPDATER_URL: ${UPDATER_URL:-http://updater:8787}
      UPDATER_SECRET: ${UPDATER_SECRET:-}
    # First run only: applies db/schema.sql (+ optional demo seed) before
    # starting the server. Safe to leave in — db-setup.mjs is idempotent
    # against an already-migrated schema.
    command: >
      sh -c "node scripts/db-setup.mjs && node server.js"

  # Sidecar that lets the admin panel update the app to the latest release
  # with one click (Настройки → Обновления). It's the only container that
  # touches the Docker socket — `app` itself never gets it — and is not
  # published to the host, only reachable from other containers on this
  # compose network, and only acts on requests carrying UPDATER_SECRET.
  # Requires UPDATER_SECRET (and ideally COMPOSE_PROJECT_NAME, so it updates
  # *this* stack rather than guessing the project name) in .env — start.sh
  # sets both up automatically for new installs.
  updater:
    image: python:3.12-alpine
    container_name: techno-store-updater
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace:ro
    working_dir: /workspace
    environment:
      # Left empty, the sidecar starts but refuses every /update request —
      # safer default than blocking `docker compose up` on installs that
      # haven't set it yet. Set it (and the matching UPDATER_SECRET on `app`
      # above) to enable one-click updates from the admin panel.
      UPDATER_SECRET: ${UPDATER_SECRET:-}
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-}
    command: >
      sh -c "apk add --no-cache docker-cli docker-cli-compose >/dev/null 2>&1 && python3 scripts/updater.py"

  # Optional FTP access to the uploads volume (product photos, logos) so you
  # can manage files without entering the container. Started only with the
  # "ftp" profile: `docker compose --profile ftp up -d` (start.sh does this
  # automatically and generates the credentials into .env).
  ftp:
    image: delfer/alpine-ftp-server:latest
    container_name: techno-store-ftp
    restart: unless-stopped
    profiles: ["ftp"]
    ports:
      - "21:21"
      - "21000-21010:21000-21010"
    environment:
      # start.sh generates FTP_USER/FTP_PASSWORD into .env; without a password
      # the service is not started (start.sh checks before enabling the profile).
      USERS: "${FTP_USER:-techno}|${FTP_PASSWORD:-}|/ftp/uploads"
      ADDRESS: ${FTP_ADDRESS:-}
      MIN_PORT: "21000"
      MAX_PORT: "21010"
    volumes:
      - techno_store_uploads:/ftp/uploads

  # Reverse proxy with automatic HTTPS (Let's Encrypt) for a custom domain.
  # No nginx/certbot setup needed: Caddy obtains and renews the certificate
  # itself. Started only with the "proxy" profile — start.sh enables it
  # automatically when a domain was entered. Requirements: the domain's DNS
  # A-record points to this server and ports 80/443 are free.
  caddy:
    image: caddy:2-alpine
    container_name: techno-store-caddy
    restart: unless-stopped
    profiles: ["proxy"]
    ports:
      - "80:80"
      - "443:443"
    command: caddy reverse-proxy --from ${DOMAIN:?set DOMAIN in .env to use the proxy} --to app:3000
    depends_on:
      - app
    volumes:
      # Persist certificates so restarts don't re-request them (rate limits).
      - techno_store_caddy_data:/data
      - techno_store_caddy_config:/config

volumes:
  techno_store_pgdata:
  techno_store_uploads:
  techno_store_caddy_data:
  techno_store_caddy_config:
